<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up · Fairsplit</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    :root{--primary:#2D6A4F;--primary-light:#52B788;--primary-pale:#D8F3DC;--bg:#F8FAF9;--border:#E2EBE7;--text:#1A2E25;--text-muted:#6B8F7A;}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;}
    .auth-card{background:white;border-radius:24px;padding:48px;width:440px;max-width:95vw;border:1px solid var(--border);box-shadow:0 8px 40px rgba(45,106,79,0.1);}
    .logo{font-family:'Syne',sans-serif;font-weight:800;font-size:26px;text-align:center;margin-bottom:8px;}
    .logo span{color:var(--primary);}
    .auth-subtitle{text-align:center;color:var(--text-muted);font-size:15px;margin-bottom:32px;}
    .form-group{margin-bottom:18px;}
    .form-label{display:block;font-weight:600;font-size:14px;margin-bottom:6px;}
    .form-control{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:12px;font-family:'DM Sans',sans-serif;font-size:15px;outline:none;transition:border-color 0.2s;}
    .form-control:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(45,106,79,0.1);}
    .btn{width:100%;padding:13px;border-radius:12px;font-family:'DM Sans',sans-serif;font-weight:600;font-size:16px;cursor:pointer;border:none;background:var(--primary);color:white;transition:all 0.2s;margin-top:4px;}
    .btn:hover{background:#235c43;transform:translateY(-1px);}
    .auth-footer{text-align:center;margin-top:20px;font-size:14px;color:var(--text-muted);}
    .auth-footer a{color:var(--primary);font-weight:600;text-decoration:none;}
    .alert{padding:12px 16px;border-radius:10px;margin-bottom:16px;font-size:14px;font-weight:500;}
    .alert-error{background:#FFEBEC;color:#E63946;}
    .alert-success{background:var(--primary-pale);color:var(--primary);}
    .free-badge{display:inline-block;background:var(--primary-pale);color:var(--primary);font-size:12px;font-weight:600;padding:3px 10px;border-radius:20px;margin-bottom:24px;}
  </style>
</head>
<body>
  <div class="auth-card">
    <div class="logo">Fair<span>split</span></div>
    <div class="auth-subtitle">Create your free account in seconds</div>
    <div style="text-align:center"><span class="free-badge">✨ Always free for students</span></div>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
        <div class="alert alert-{{ cat }}">{{ msg }}</div>
      {% endfor %}
    {% endwith %}
    <form method="POST">
      <div class="form-group">
        <label class="form-label">Full Name</label>
        <input type="text" name="name" class="form-control" placeholder="Arjun Sharma" required>
      </div>
      <div class="form-group">
        <label class="form-label">Email address</label>
        <input type="email" name="email" class="form-control" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" placeholder="Min 6 characters" minlength="6" required>
      </div>
      <button type="submit" class="btn">Create Account →</button>
    </form>
    <div class="auth-footer">Already have an account? <a href="{{ url_for('login') }}">Log in</a></div>
  </div>
</body>
</html>
